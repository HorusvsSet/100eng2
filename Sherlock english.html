<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sherlock Detectives</title>
<style>
:root{--bg:#0f0b08;--bg2:#1a1410;--card:#221b12;--cardh:#2e2419;--gold:#b8943e;--gold2:#8a6828;--blue:#5a7a9a;--red:#9b4036;--green:#5a8a5a;--txt:#d4c8b0;--dim:#7a7060;--line:#2e241c;--paper:#f0e6d3;--ovl:rgba(10,8,4,.92)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Georgia,serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg width='80' height='80' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='80' height='80' fill='none' stroke='%232e241c' stroke-width='0.3'/%3E%3C/svg%3E");opacity:.4;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 15%,rgba(200,150,60,.06),transparent 55%),radial-gradient(ellipse at 70% 85%,rgba(120,80,40,.04),transparent 50%);pointer-events:none;z-index:0}
.scr{position:relative;z-index:1;display:none;flex-direction:column;align-items:center;min-height:100vh}
.scr.active{display:flex}
#start{justify-content:center;text-align:center;padding:30px 20px}
.st-logo{position:relative;margin-bottom:12px}
.st-logo .pipe{font-size:7rem;display:block;animation:float 3.5s ease-in-out infinite;filter:drop-shadow(0 10px 30px rgba(200,150,60,.25))}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
.st-logo .ring{position:absolute;inset:-20px;border:2px solid rgba(200,150,60,.1);border-radius:50%;animation:spin 20s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.st-logo .ring2{position:absolute;inset:-40px;border:1px solid rgba(200,150,60,.06);border-radius:50%;animation:spin 30s linear infinite reverse}
#start h1{font-size:clamp(1.8rem,6vw,3rem);font-weight:900;background:linear-gradient(180deg,var(--gold),#e0c060,var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:0 0 4px;letter-spacing:.08em;filter:drop-shadow(0 2px 8px rgba(180,140,60,.3))}
#start .tagline{font-style:italic;font-size:.9rem;color:var(--dim);letter-spacing:.14em;margin-bottom:28px}
.btn-start{position:relative;padding:15px 50px;font-size:1.05rem;font-weight:700;cursor:pointer;background:transparent;color:var(--gold);border:2px solid var(--gold);text-transform:uppercase;letter-spacing:.14em;font-family:Georgia,serif;transition:.4s;overflow:hidden}
.btn-start::before{content:'';position:absolute;inset:0;background:linear-gradient(45deg,transparent 45%,rgba(200,150,60,.15) 50%,transparent 55%);transform:translateX(-100%);transition:.6s}
.btn-start:hover::before{transform:translateX(100%)}
.btn-start:hover{background:rgba(200,150,60,.08);box-shadow:0 0 30px rgba(200,150,60,.1),inset 0 0 30px rgba(200,150,60,.03);transform:translateY(-2px)}
.btn-start:active{transform:scale(.96)}
#chapters{padding:20px 14px 50px}
.topbar{width:100%;max-width:700px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.btn-back{display:inline-flex;align-items:center;gap:4px;background:var(--bg2);border:1px solid var(--line);color:var(--txt);padding:8px 14px;cursor:pointer;font-size:.76rem;font-family:Georgia,serif;transition:.3s;position:relative;overflow:hidden}
.btn-back::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--gold);transform:scaleX(0);transition:.3s}
.btn-back:hover::after{transform:scaleX(1)}
.btn-back:hover{border-color:var(--gold);color:var(--gold);background:rgba(200,150,60,.05)}
.hero-ch{text-align:center;margin:0 0 14px}
.hero-ch h2{font-size:clamp(1.4rem,5vw,2rem);font-weight:900;color:var(--gold);letter-spacing:.06em;margin-bottom:2px}
.hero-ch p{font-style:italic;font-size:.78rem;color:var(--dim);letter-spacing:.08em}
.orn{color:var(--gold);font-size:.6rem;letter-spacing:5px;opacity:.4;margin:4px 0}
.progress-panel{width:100%;max-width:540px;background:var(--bg2);border:1px solid var(--line);padding:14px 20px;margin-bottom:18px;position:relative;overflow:hidden}
.progress-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}
.pts-row{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;color:var(--dim)}
.pts-row b{color:var(--gold);font-size:1.15rem}
.bar-wrap{width:100%;height:4px;background:var(--line);margin:8px 0;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),#e0c060);border-radius:2px;transition:width .6s ease;box-shadow:0 0 8px rgba(200,150,60,.2)}
.pts-hint{font-size:.66rem;color:var(--dim);font-style:italic;text-align:center}
.btn-reset{padding:4px 12px;font-size:.62rem;border:1px solid var(--line);background:transparent;color:var(--dim);cursor:pointer;font-family:Georgia,serif;transition:.3s;margin-top:8px}
.btn-reset:hover{border-color:var(--red);color:var(--red);background:rgba(155,64,54,.05)}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:10px;width:100%;max-width:680px}
.ch-card{background:var(--card);border:1px solid var(--line);padding:16px 10px 12px;text-align:center;cursor:pointer;transition:.3s;position:relative;overflow:hidden}
.ch-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:transparent;transition:.3s}
.ch-card:hover:not(.locked)::before{background:var(--gold)}
.ch-card:hover:not(.locked){border-color:var(--gold);transform:translateY(-4px);box-shadow:0 10px 25px rgba(0,0,0,.3),0 0 15px rgba(200,150,60,.06);background:var(--cardh)}
.ch-card:active:not(.locked){transform:scale(.95)}
.ch-card.locked{opacity:.22;cursor:not-allowed;filter:grayscale(.85)}
.ch-card.done{border-color:var(--green);background:rgba(90,138,90,.02)}
.ch-card.done::after{content:'\2713';position:absolute;top:6px;right:8px;color:var(--green);font-weight:900;font-size:.9rem}
.ch-card.pinned{border-color:var(--blue);box-shadow:inset 0 0 0 1px rgba(90,122,154,.1)}
.ch-num{font-size:2.2rem;font-weight:900;color:var(--gold);line-height:1;transition:.3s}
.ch-card.locked .ch-num,.ch-card.done .ch-num{color:var(--dim)}
.ch-stars{font-size:.7rem;margin:3px 0 4px;letter-spacing:1px}
.ch-info{font-size:.6rem;color:var(--dim);line-height:1.5}
.ch-info span{display:block}
.ch-score{font-size:.58rem;color:var(--gold);margin-top:3px;font-style:italic}
.ch-lock{position:absolute;bottom:5px;right:5px;font-size:.7rem;opacity:.3}
#actas{padding:20px 14px 50px}
.info-bar{width:100%;max-width:680px;background:var(--bg2);border:1px solid var(--line);padding:10px 16px;margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;align-items:center;font-size:.76rem;color:var(--dim)}
.info-bar b{color:var(--gold)}
.acta-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:500px}
.acta-card{background:var(--card);border:1px solid var(--line);padding:20px 14px 16px;text-align:center;cursor:pointer;transition:.3s;position:relative;overflow:hidden;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.acta-card::after{content:'';position:absolute;bottom:0;left:8px;right:8px;height:1px;background:var(--line);opacity:.4}
.acta-card:hover:not(.locked){border-color:var(--gold);transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.3);background:var(--cardh)}
.acta-card.current{border-color:var(--gold);box-shadow:0 0 0 1px rgba(200,150,60,.15),0 0 20px rgba(200,150,60,.06)}
.acta-card.done{border-color:var(--green);background:rgba(90,138,90,.03)}
.acta-card.locked{opacity:.2;cursor:not-allowed;filter:grayscale(.75)}
.anum{font-size:2.5rem;font-weight:900;color:var(--gold);line-height:1;transition:.3s}
.acta-card.current .anum{color:var(--gold);text-shadow:0 0 15px rgba(200,150,60,.2)}
.acta-card.done .anum{color:var(--green)}
.acta-card.locked .anum{color:var(--dim)}
.alabel{font-size:.7rem;color:var(--dim);margin:2px 0}
.ascore{font-size:.66rem;color:var(--dim)}
.acta-card.done .ascore{color:var(--green)}
.aicon{position:absolute;top:7px;right:9px;font-size:.85rem;font-weight:700}
.acta-card.current .aicon{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#game{padding:14px 14px 40px}
.game-hdr{width:100%;max-width:740px;background:var(--bg2);border:1px solid var(--line);padding:8px 14px;margin-bottom:10px;text-align:center;font-size:.74rem;color:var(--dim)}
.game-hdr b{color:var(--gold)}
.diff-pills{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.pill{background:var(--bg2);border:1px solid var(--line);padding:5px 10px;font-size:.72rem;display:flex;align-items:center;gap:4px;transition:.3s}
.pill .p-lbl{color:var(--dim);font-size:.62rem}
.pill .p-val{font-weight:700;color:var(--gold)}
.suspect-list{display:flex;flex-direction:column;gap:8px;width:100%;max-width:740px;margin-bottom:14px}
.s-card{background:var(--card);border:1px solid var(--line);padding:12px 14px;cursor:pointer;transition:.3s;display:flex;align-items:flex-start;gap:10px;position:relative;border-left:3px solid transparent}
.s-card::after{content:'';position:absolute;bottom:0;left:10px;right:10px;height:1px;background:var(--line);opacity:.25;transition:.3s}
.s-card:hover{border-color:rgba(200,150,60,.3);background:var(--cardh);transform:translateX(4px);border-left-color:var(--gold)}
.s-card.picked{border-color:var(--red)!important;background:rgba(155,64,54,.06)!important;border-left-color:var(--red)!important;box-shadow:inset 0 0 0 1px rgba(155,64,54,.08),0 0 15px rgba(155,64,54,.06)}
.s-card.picked .dot{background:var(--red);border-color:var(--red);color:var(--paper);box-shadow:0 0 8px rgba(155,64,54,.3)}
.dot{width:22px;height:22px;min-width:22px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;transition:.3s;color:transparent;margin-top:3px;flex-shrink:0}
.av{width:48px;height:48px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;box-shadow:0 3px 8px rgba(0,0,0,.5);transition:.3s}
.s-card:hover .av{transform:scale(1.05)}
.s-info{flex:1;min-width:0}
.s-name{font-weight:700;font-size:.95rem;color:var(--txt);letter-spacing:.02em}
.s-meta{font-size:.64rem;color:var(--dim);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap;font-style:italic}
.s-phrase{margin-top:7px;font-style:italic;font-size:.8rem;color:var(--paper);background:rgba(200,150,60,.04);padding:9px 12px;border-left:3px solid var(--gold);line-height:1.55;word-break:break-word;transition:.3s}
.s-card:hover .s-phrase{background:rgba(200,150,60,.06)}
.game-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.btn{padding:10px 28px;font-size:.84rem;font-weight:700;cursor:pointer;border:1px solid transparent;text-transform:uppercase;letter-spacing:.06em;font-family:Georgia,serif;transition:.3s;position:relative;overflow:hidden}
.btn-check{background:var(--gold);color:#1a1410;border-color:var(--gold)}
.btn-check:hover:not(:disabled){background:#c89e3e;box-shadow:0 4px 16px rgba(200,150,60,.2);transform:translateY(-2px)}
.btn-check:active:not(:disabled){transform:scale(.96)}
.btn-check:disabled{opacity:.25;cursor:not-allowed;filter:grayscale(.5)}
.btn-next{background:var(--green);color:#1a1410;border-color:var(--green);display:none}
.btn-next.show{display:inline-block;animation:fadeIn .3s ease}
.btn-next:hover{background:#5a9a5a;transform:translateY(-2px);box-shadow:0 4px 16px rgba(90,138,90,.2)}
.btn-next:active{transform:scale(.96)}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.score-bar{width:100%;max-width:740px;background:var(--bg2);border:1px solid var(--line);padding:7px 14px;text-align:center;font-size:.72rem;color:var(--dim)}
.score-bar b{color:var(--gold)}
.ovl{position:fixed;inset:0;background:var(--ovl);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.ovl.on{display:flex;animation:fadeInOvl .25s ease}
@keyframes fadeInOvl{from{opacity:0}to{opacity:1}}
.mdl{background:var(--bg2);border:2px solid var(--line);padding:28px 22px 22px;text-align:center;max-width:380px;width:90%;animation:popIn .35s ease;position:relative;box-shadow:0 20px 50px rgba(0,0,0,.5)}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.mdl::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.mdl .m-emo{font-size:2.8rem;display:block;margin-bottom:8px;animation:float 3s ease-in-out infinite}
.mdl h3{font-size:1.15rem;margin-bottom:6px;letter-spacing:.04em}
.mdl .win{color:var(--green)}.mdl .lose{color:var(--red)}.mdl .note{color:var(--gold)}
.mdl .m-detail{font-size:.78rem;color:var(--dim);margin-bottom:16px;line-height:1.55}
.mdl .m-detail b{color:var(--txt)}
.btn-close{padding:9px 28px;font-weight:700;cursor:pointer;border:2px solid var(--gold);background:transparent;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;font-family:Georgia,serif;font-size:.8rem;transition:.3s}
.btn-close:hover{background:var(--gold);color:#1a1410;box-shadow:0 0 20px rgba(200,150,60,.15)}
.btn-round-nav{background:var(--bg2);border:1px solid var(--line);color:var(--txt);padding:4px 8px;cursor:pointer;font-size:.7rem;font-family:Georgia,serif;transition:.3s;border-radius:2px}
.btn-round-nav:hover{border-color:var(--gold);color:var(--gold);background:rgba(200,150,60,.05)}
.btn-round-nav:disabled{opacity:.25;cursor:not-allowed}
.round-sel-bar{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:8px;width:100%;max-width:740px}
.rnd-dot{width:26px;height:26px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--dim);font-size:.62rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.3s;font-family:Georgia,serif}
.rnd-dot:hover{border-color:var(--gold);color:var(--gold);background:var(--cardh)}
.rnd-dot.active{border-color:var(--gold);background:rgba(200,150,60,.15);color:var(--gold);box-shadow:0 0 8px rgba(200,150,60,.2)}
.rnd-dot.done{border-color:var(--green);background:rgba(90,138,90,.15);color:var(--green)}
@media(max-width:500px){.ch-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:7px}.ch-card{padding:10px 6px 8px}.ch-num{font-size:1.7rem}.acta-grid{grid-template-columns:1fr 1fr;gap:8px}.acta-card{padding:14px 8px 12px}.anum{font-size:1.8rem}.s-card{padding:10px 10px}.av{width:38px;height:38px;font-size:1.2rem}}
</style></head><body>
<div class="scr active" id="start"><div class="st-logo"><span class="pipe">🕵️‍♂️</span><div class="ring"></div><div class="ring2"></div></div><h1>Sherlock Detectives</h1><p class="tagline">Deduction is a real art.</p><button class="btn-start" onclick="goChapters()">Start</button><br><br><button class="btn-start" id="btnFree" onclick="toggleFree()" style="font-size:.75rem;padding:8px 20px;border-color:var(--blue);color:var(--blue)">🔒 Normal</button></div>

<div class="scr" id="game"><div class="topbar"><button class="btn-back" onclick="backActas()">← Act</button><div style="font-size:.76rem;color:var(--dim)">Round <b id="rd">1</b>/<b>10</b></div><div style="display:flex;gap:3px"><button class="btn-round-nav" onclick="prevRound()" id="bprev" title="Previous round">◀</button><button class="btn-round-nav" onclick="nextRound()" id="bnxtr" title="Next round">▶</button></div></div><div class="round-sel-bar" id="roundSelBar"></div><div class="game-hdr" id="ghdr"></div><div class="diff-pills" id="pills"></div><div class="suspect-list" id="slist"></div><div class="game-actions"><button class="btn btn-check" id="bchk" onclick="doCheck()">🔎 Deduct</button><button class="btn btn-next" id="bnxt" onclick="doNext()">▶ Next</button></div><div class="score-bar">Acta: <b id="sc">0</b>/10 · Chapter: <b id="stot">0</b>/100 · Meta: 80</div></div>

function goActas(ch){ST.ch=ch;hideAll();document.getElementById('actas').classList.add('active');renderActas()}
function goGame(a){ST.acta=a;ST.round=0;var d=LD();ST.score=(d.sc[ST.ch]&&d.sc[ST.ch][a])||0;ST.rounds=[];hideAll();document.getElementById('game').classList.add('active');document.getElementById('bnxt').classList.remove('show');document.getElementById('bchk').disabled=false;document.getElementById('sc').textContent='0';document.getElementById('stot').textContent=CD(ST.ch);document.getElementById('ghdr').innerHTML='Acta <b>'+(a+1)+'</b> · Capítulo <b>'+ST.ch+'</b>';renderRound();renderRoundDots()}
function renderRoundDots(){var g=document.getElementById('roundSelBar');g.innerHTML='';for(var i=0;i<10;i++){var d=document.createElement('div');d.className='rnd-dot';if(i===ST.round)d.classList.add('active');if(i<ST.round)d.classList.add('done');d.textContent=i+1;(function(idx){d.addEventListener('click',function(){jumpRound(idx)})})(i);g.appendChild(d)}}
function jumpRound(idx){saveActa();ST.round=idx;ST.sel=new Set();document.getElementById('bnxt').classList.remove('show');document.getElementById('bchk').disabled=false;document.getElementById('bchk').style.display='inline-block';renderRound();renderRoundDots();updateRoundNav()}
function prevRound(){if(ST.round>0){jumpRound(ST.round-1)}}
function nextRound(){if(ST.round<9){jumpRound(ST.round+1)}}
function updateRoundNav(){document.getElementById('bprev').disabled=ST.round<=0;document.getElementById('bnxtr').disabled=ST.round>=9}
function backActas(){saveActa();hideAll();document.getElementById('actas').classList.add('active');renderActas()}
function saveActa(){var d=LD();if(!d.sc[ST.ch])d.sc[ST.ch]=[];var old=d.sc[ST.ch][ST.acta]||0;d.sc[ST.ch][ST.acta]=Math.max(old,ST.score);var mx=20;for(var i=1;i<=20;i++){if(CD(i)<80){mx=i;break}}d.mx=Math.max(1,mx);SV(d)}

function renderChapters(){
  ST.freeMode=getFreeMode();
  var g=document.getElementById('chgrid');g.innerHTML='';var d=LD();
  for(var i=1;i<=20;i++){
    var n=L[i],st=STARS(n.s,n.c,n.m),ss='⭐'.repeat(st)+'☆'.repeat(5-st);
    var lk=ST.freeMode?false:!UL(i),dn=CD(i)>=80,pts=CD(i);
    var c=document.createElement('div');c.className='ch-card';
    if(lk)c.classList.add('locked');if(dn&&!ST.freeMode)c.classList.add('done');if(!lk&&!dn)c.classList.add('pinned');
    if(ST.freeMode&&CD(i)>=80)c.classList.add('done');
    var extra=pts>0?'<div class="ch-score">'+pts+' pts</div>':'';
    c.innerHTML='<div class="ch-num">'+i+'</div><div class="ch-stars">'+ss+'</div><div class="ch-info"><span>👤 '+n.s+' · 🎯 '+n.c+' · 🤥 '+n.m+'</span><span>'+n.r.length+' rondas</span></div>'+extra+(lk?'<div class="ch-lock">🔒</div>':'');
    if(!lk){(function(lv){c.addEventListener('click',function(){goActas(lv)})})(i)}
    g.appendChild(c)
  }
  updateProg()
}

function updateProg(){
  var d=LD(),total=0;for(var k in d.sc)for(var i=0;i<10;i++)total+=d.sc[k][i]||0;
  document.getElementById('tp').textContent=total;
  var cur=1;for(var i=1;i<=20;i++){if(!UL(i)&&i>1){cur=i-1;break}if(CD(i)<80){cur=i;break}if(i===20&&CD(20)>=80)cur=20}
  var cs=CD(cur);
  document.getElementById('bar').style.width=Math.min(100,cs/80*100)+'%';
  document.getElementById('hnext').textContent=CD(20)>=80?'🎉 ¡Todos los capítulos completados!':'Capítulo '+cur+': '+cs+'/80 pts → desbloquear capítulo '+(cur+1)
}

function renderActas(){
  ST.freeMode=getFreeMode();
  var n=L[ST.ch],d=LD(),sc=d.sc[ST.ch]||[];
  document.getElementById('actaTit').textContent='Capítulo '+ST.ch;
  document.getElementById('actaInfo').innerHTML='👤 <b>'+n.s+'</b> · 🎯 <b>'+n.c+'</b> · 🤥 <b>'+n.m+'</b> | Puntuación: <b>'+CD(ST.ch)+'</b>/100 | <span style="font-size:.68rem;font-style:italic">'+(ST.freeMode?'Modo libre':'80 pts → siguiente capítulo')+'</span>';
  var g=document.getElementById('actaGrid');g.innerHTML='';
  var cur=-1;for(var i=0;i<10;i++){if(!sc.hasOwnProperty(i)){cur=i;break}}if(cur===-1)cur=10;
  for(var i=0;i<10;i++){
    var c=document.createElement('div');c.className='acta-card';
    var played=sc.hasOwnProperty(i)&&typeof sc[i]==='number';
    var lk=ST.freeMode?false:i>cur;
    if(lk)c.classList.add('locked');else if(played)c.classList.add('done');else c.classList.add('current');
    c.innerHTML='<div class="anum">'+(i+1)+'</div><div class="alabel">Acta '+(i+1)+'</div>'+(played?'<div class="ascore">'+sc[i]+'/10</div>':'')+'<div class="aicon">'+(lk?'🔒':played?'✓':'▶')+'</div>';
    if(!lk){(function(idx){c.addEventListener('click',function(){goGame(idx)})})(i)}
    g.appendChild(c)
  }
}

function renderRound(){
  var n=L[ST.ch],start=ST.acta*10,r=n.r[start+ST.round];
  ST.sel=new Set();
  document.getElementById('pills').innerHTML='<div class="pill"><span class="p-lbl">👤 Sospechosos</span><span class="p-val">'+n.s+'</span></div><div class="pill"><span class="p-lbl">🎯 Culpables</span><span class="p-val">'+n.c+'</span></div><div class="pill"><span class="p-lbl">🤥 Mentirosos</span><span class="p-val">'+n.m+'</span></div><div class="pill"><span class="p-lbl">✋ Marcar</span><span class="p-val">'+n.c+'</span></div>';
  document.getElementById('rd').textContent=(ST.round+1);
  document.getElementById('bchk').style.display='inline-block';document.getElementById('bchk').disabled=false;
  document.getElementById('bnxt').classList.remove('show');document.getElementById('sc').textContent=ST.score;
  var lst=document.getElementById('slist');lst.innerHTML='';
  S.slice(0,n.s).forEach(function(s,i){
    var fid=r[i],fr=F[fid]||'...';
    var t=document.createElement('div');t.className='s-card';t.dataset.id=s.id;
    t.innerHTML='<div class="dot">✓</div><div class="av" style="background:'+s.c+'">'+s.e+'</div><div class="s-info"><div class="s-name">'+s.n+'</div><div class="s-meta">📏 '+s.h+' cm · 🍽️ '+s.d+'</div><div class="s-phrase">💬 «'+fr+'»</div></div>';
    t.addEventListener('click',function(){toggle(s.id,t)});
    lst.appendChild(t)
  })
  updateRoundNav()
}

function toggle(id,el){if(ST.sel.has(id)){ST.sel.delete(id);el.classList.remove('picked')}else{ST.sel.add(id);el.classList.add('picked')}}

function doCheck(){
  var n=L[ST.ch];
  if(ST.sel.size===0){popup('👆','Seleccione un sospechoso','Debe marcar exactamente <b>'+n.c+'</b> culpable'+(n.c>1?'s':'')+'.','note');return}
  if(ST.sel.size!==n.c){popup('👤','Selección incorrecta','Debe seleccionar exactamente <b>'+n.c+'</b> culpable'+(n.c>1?'s':'')+'. Ha marcado <b>'+ST.sel.size+'</b>.','lose');return}
  var start=ST.acta*10,r=n.r[start+ST.round];
  var sol=r[r.length-1].split(' ').map(Number).sort(function(a,b){return a-b});
  var picked=Array.from(ST.sel).sort(function(a,b){return a-b});
  var ok=sol.length===picked.length&&sol.every(function(v,i){return v===picked[i]});
  var isLast=ST.round>=9;
  ST.rounds.push({round:ST.round+1,ok:ok});
  if(ok){ST.score++}
  document.getElementById('sc').textContent=ST.score;
  saveActa();document.getElementById('stot').textContent=CD(ST.ch);
  if(isLast){
    var tp=ST.rounds.filter(function(x){return x.ok}).length;
    var msg='Acta completada. Resultado: <b>'+tp+'</b> / 10 aciertos<br><small>Capítulo '+CD(ST.ch)+'/100</small>';
    if(CD(ST.ch)>=80&&ST.ch+1<=20)msg+='<br><br>🔓 <b>¡Capítulo '+(ST.ch+1)+' desbloqueado!</b>';
    popup('📋','Acta finalizada',msg,tp>=8?'win':'lose',true);
    document.getElementById('bnxt').classList.add('show');
    document.getElementById('bnxt').textContent='▶ Ver resultados'
  }else{
    doNext()
  }
}
function doNext(){
  saveActa();document.getElementById('stot').textContent=CD(ST.ch);
  if(ST.round>=9){backActas();return}
  ST.round++;ST.sel=new Set();renderRound();renderRoundDots();updateRoundNav()
}

function popup(emo,title,detail,cls,auto){
  var ov=document.getElementById('ovl'),md=document.getElementById('mdl');
  md.innerHTML='<span class="m-emo">'+emo+'</span><h3 class="'+cls+'">'+title+'</h3><p class="m-detail">'+detail+'</p><button class="btn-close" onclick="closeModal()">Continuar</button>';
  ov.classList.add('on')
}
function closeModal(){
  document.getElementById('ovl').classList.remove('on');
  if(ST.round>=9){backActas()}
}
document.getElementById('ovl').addEventListener('click',function(e){if(e.target===this)closeModal()});

function resetAll(){if(confirm('¿Borrar todo el progreso?')){SV({mx:1,sc:{}});localStorage.freeMode='false';ST.freeMode=false;goChapters()}}

goStart();
